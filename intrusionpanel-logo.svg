<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1f18"/>
      <stop offset="100%" stop-color="#020608"/>
    </radialGradient>
    <radialGradient id="shieldGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#00ffaa" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00ffaa" stop-opacity="0.03"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="shieldClip">
      <path d="M200 68 L296 102 L296 200 Q296 270 200 318 Q104 270 104 200 L104 102 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGlow)"/>

  <!-- Subtle grid -->
  <g opacity="0.06" stroke="#00ffaa" stroke-width="0.5">
    <line x1="0" y1="50"  x2="400" y2="50"/>
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="150" x2="400" y2="150"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="250" x2="400" y2="250"/>
    <line x1="0" y1="300" x2="400" y2="300"/>
    <line x1="0" y1="350" x2="400" y2="350"/>
    <line x1="50"  y1="0" x2="50"  y2="400"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="150" y1="0" x2="150" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="250" y1="0" x2="250" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="350" y1="0" x2="350" y2="400"/>
  </g>

  <!-- Outer ring (dim) -->
  <circle cx="200" cy="200" r="165" fill="none" stroke="#00ffaa" stroke-width="0.8" opacity="0.12"/>
  <!-- Middle ring -->
  <circle cx="200" cy="200" r="148" fill="none" stroke="#00ffaa" stroke-width="0.5" opacity="0.08"/>

  <!-- Tick marks on outer ring -->
  <g filter="url(#softGlow)" stroke="#00ffaa" stroke-width="1.5" opacity="0.5">
    <line x1="200" y1="33"  x2="200" y2="44"/>
    <line x1="200" y1="356" x2="200" y2="367"/>
    <line x1="33"  y1="200" x2="44"  y2="200"/>
    <line x1="356" y1="200" x2="367" y2="200"/>
  </g>
  <!-- Diagonal ticks -->
  <g stroke="#00ffaa" stroke-width="1" opacity="0.3">
    <line x1="83"  y1="55"  x2="89"  y2="65"/>
    <line x1="317" y1="55"  x2="311" y2="65"/>
    <line x1="83"  y1="345" x2="89"  y2="335"/>
    <line x1="317" y1="345" x2="311" y2="335"/>
  </g>

  <!-- Shield body fill -->
  <path d="M200 68 L296 102 L296 200 Q296 270 200 318 Q104 270 104 200 L104 102 Z"
        fill="url(#shieldGrad)"/>

  <!-- Shield outline (glowing) -->
  <path d="M200 68 L296 102 L296 200 Q296 270 200 318 Q104 270 104 200 L104 102 Z"
        fill="none" stroke="#00ffaa" stroke-width="2.2"
        filter="url(#glow)" opacity="0.9"/>

  <!-- Shield inner bevel -->
  <path d="M200 82 L284 112 L284 200 Q284 258 200 302 Q116 258 116 200 L116 112 Z"
        fill="none" stroke="#00ffaa" stroke-width="0.8" opacity="0.25"/>

  <!-- Horizontal crosshair lines (through shield) -->
  <g filter="url(#glow)" stroke="#00ffaa" stroke-width="1.4" opacity="0.85">
    <!-- Left arm -->
    <line x1="108" y1="193" x2="168" y2="193"/>
    <!-- Right arm -->
    <line x1="232" y1="193" x2="292" y2="193"/>
    <!-- Top arm -->
    <line x1="200" y1="78"  x2="200" y2="158"/>
    <!-- Bottom arm -->
    <line x1="200" y1="228" x2="200" y2="300"/>
  </g>

  <!-- Crosshair gap ticks -->
  <g stroke="#00ffaa" stroke-width="2.5" opacity="0.6" filter="url(#softGlow)">
    <line x1="168" y1="188" x2="168" y2="198"/>
    <line x1="232" y1="188" x2="232" y2="198"/>
    <line x1="195" y1="158" x2="205" y2="158"/>
    <line x1="195" y1="228" x2="205" y2="228"/>
  </g>

  <!-- Center circle -->
  <circle cx="200" cy="193" r="16" fill="none" stroke="#00ffaa" stroke-width="2"
          filter="url(#glowStrong)" opacity="0.95"/>
  <!-- Inner dot -->
  <circle cx="200" cy="193" r="4" fill="#00ffaa" filter="url(#glowStrong)" opacity="0.9"/>

  <!-- Corner bracket marks on shield top -->
  <g stroke="#00ffaa" stroke-width="2" fill="none" opacity="0.6" filter="url(#softGlow)">
    <!-- top-left bracket -->
    <polyline points="130,112 120,112 120,122"/>
    <!-- top-right bracket -->
    <polyline points="270,112 280,112 280,122"/>
  </g>

  <!-- "IP" monogram subtle watermark inside shield -->
  <text x="200" y="255" text-anchor="middle"
        font-family="monospace" font-size="11" letter-spacing="6"
        fill="#00ffaa" opacity="0.18">INTRUSION</text>

  <!-- ── WORDMARK ── -->
  <!-- INTRUSIONPANEL -->
  <text x="200" y="365" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="15" font-weight="bold" letter-spacing="4"
        fill="#00ffaa" filter="url(#glow)" opacity="0.95">INTRUSIONPANEL</text>

  <!-- Underline bar -->
  <rect x="108" y="370" width="184" height="1.5" fill="#00ffaa" opacity="0.35"/>

  <!-- Corner decoration marks (logo frame) -->
  <g stroke="#00ffaa" stroke-width="1.5" fill="none" opacity="0.4">
    <polyline points="20,20 20,36 36,36"/>
    <polyline points="380,20 380,36 364,36"/>
    <polyline points="20,380 20,364 36,364"/>
    <polyline points="380,380 380,364 364,364"/>
  </g>

  <!-- Version tag -->
  <text x="380" y="395" text-anchor="end"
        font-family="monospace" font-size="8" letter-spacing="1"
        fill="#00ffaa" opacity="0.2">v1.0</text>

</svg>
